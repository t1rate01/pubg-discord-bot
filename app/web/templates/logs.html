{% extends "base.html" %}
{% block content %}
<h1>Logs</h1>

<section class="panel">
  <div class="page-header">
    <div>Auto-refreshes every 5 seconds</div>
    <a class="button secondary" href="/logs">Refresh now</a>
  </div>
  <pre class="log-box">{% for line in lines %}{{ line }}{% endfor %}</pre>
</section>

<script>
  setTimeout(() => {
    window.location.reload();
  }, 5000);
</script>
{% endblock %}
